<!-- GoFit Meal - Supabase Edition -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#000000;
    --bg-2:#0b0b0c;
    --card:#121214;
    --card-2:#17171a;
    --line:#28282d;
    --lime:#3fb24a;
    --lime-2:#5ecb5c;
    --lime-dk:#2c8a38;
    --green:#2c8a38;
    --text:#f3f4f1;
    --muted:#9a9d98;
    --cream:#0a0a0b;
    --cream-2:#0e0e10;
    --cream-line:#26262b;
    --ink:#f3f4f1;
    --muted-l:#9a9d98;
    --red:#e23b3b;
    --red-dk:#b71f2a;
    --orange:#e23b3b;
    --bkash:#e2136e;
    --shadow:0 24px 50px -24px rgba(0,0,0,.55);
    --r:20px;
    font-synthesis:none;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4,h5,.dsp{font-family:'Sora',sans-serif;letter-spacing:-.02em;line-height:1.04}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  input,select,textarea{font-family:inherit}
  .wrap{max-width:1200px;margin:0 auto;padding:0 24px}
  .hidden{display:none!important}

  /* LOGIN PAGE */
  .auth-page{position:fixed;top:0;left:0;right:0;bottom:0;display:grid;place-items:center;background:var(--bg);z-index:100}
  .auth-box{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:40px;max-width:380px;width:100%}
  .auth-box h2{font-size:1.8rem;margin-bottom:8px}
  .auth-box p{color:var(--muted);margin-bottom:24px;font-size:.9rem}
  .auth-box .field{margin-bottom:16px}
  .auth-box .field label{display:block;font-weight:600;font-size:.8rem;margin-bottom:6px;color:var(--muted)}
  .auth-box .field input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--bg-2);color:var(--text);font-size:.94rem}
  .auth-box .field input:focus{outline:none;border-color:var(--lime);box-shadow:0 0 0 3px rgba(143,204,63,.2)}
  .auth-box .btn{width:100%;margin-top:8px}
  .auth-box .loading{opacity:.6;pointer-events:none}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:13px 22px;border-radius:999px;font-weight:600;font-size:.94rem;transition:.18s;white-space:nowrap}
  .btn-lime{background:linear-gradient(135deg,var(--lime-2),var(--lime-dk));color:#0c1a07}
  .btn-lime:hover{transform:translateY(-2px);box-shadow:0 12px 26px -10px rgba(143,204,63,.6)}
  .btn-out{border:1.5px solid var(--line);color:var(--text)}
  .btn-out:hover{border-color:var(--lime);color:var(--lime)}
  .btn-dark{background:#16161a;color:#fff;border:1px solid var(--line)}
  .btn-dark:hover{transform:translateY(-2px)}
  .btn .ico{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:rgba(0,0,0,.18);font-size:13px}
  .btn-out .ico{background:rgba(143,204,63,.16)}

  /* NAV */
  header.nav{position:sticky;top:0;z-index:60;background:rgba(0,0,0,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .logo-img{height:42px;width:auto;display:block;mix-blend-mode:screen}
  footer .logo-img{height:48px}
  .nav-in{display:flex;align-items:center;gap:26px;height:74px}
  .brand{display:flex;align-items:center;gap:11px;cursor:pointer}
  .brand .mark{width:38px;height:38px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--lime-2),var(--green));display:grid;place-items:center;font-size:19px;box-shadow:0 0 0 3px rgba(143,204,63,.18)}
  .brand .wm{font-family:'Sora';font-weight:800;font-size:1.3rem;line-height:.9}
  .brand .wm .go{color:var(--lime)} .brand .wm .meal{display:block;font-size:.6rem;letter-spacing:.42em;font-weight:600;color:var(--muted)}
  .navlinks{display:flex;gap:4px;margin-left:auto}
  .navlinks button{padding:9px 15px;border-radius:999px;font-weight:600;font-size:.9rem;color:var(--muted);transition:.16s}
  .navlinks button:hover{color:var(--text)}
  .navlinks button.active{color:#0c1a07;background:var(--lime)}
  .nav-cart{position:relative;width:44px;height:44px;border-radius:50%;border:1px solid var(--line);display:grid;place-items:center;font-size:18px;transition:.16s;cursor:pointer}
  .nav-cart:hover{border-color:var(--lime)}
  .nav-cart .badge{position:absolute;top:-6px;right:-6px;background:var(--lime);color:#0c1a07;font-size:.68rem;font-weight:700;min-width:19px;height:19px;border-radius:999px;display:grid;place-items:center;font-family:'Inter'}

  .view{display:none}
  .view.on{display:block;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* HERO */
  .hero{position:relative;overflow:hidden;background:radial-gradient(1000px 600px at 88% -8%,rgba(76,138,42,.35),transparent 60%),var(--bg)}
  .hero-in{display:grid;grid-template-columns:1.04fr 1fr;gap:36px;align-items:center;padding:60px 0 80px}
  .hero h1{font-size:clamp(2.7rem,5.8vw,4.6rem);font-weight:800}
  .hero h1 .g{color:var(--lime)}
  .hero .lead{color:var(--muted);font-size:1.05rem;max-width:430px;margin:20px 0 24px}

  /* MEALS */
  .zone-dark{--c-bg:var(--card);--c-text:var(--text);--c-muted:var(--muted);--c-line:var(--line);--chip:#0e1b13}
  .meals{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
  .meal{background:var(--c-bg);color:var(--c-text);border:1px solid var(--c-line);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;transition:.2s}
  .meal:hover{transform:translateY(-6px);box-shadow:var(--shadow);border-color:var(--lime)}
  .meal .pic{aspect-ratio:1.22;background:linear-gradient(135deg,#1c1c20,#0e0e10);background-size:cover;background-position:center;display:grid;place-items:center;font-size:3.4rem;position:relative}
  .meal .tag{position:absolute;top:11px;left:11px;background:var(--lime);color:#0c1a07;font-size:.66rem;font-weight:800;letter-spacing:.05em;padding:4px 10px;border-radius:999px}
  .meal .body{padding:15px 15px 17px;display:flex;flex-direction:column;gap:9px;flex:1}
  .meal h4{font-size:1.02rem;font-family:'Sora';font-weight:700}
  .meal .desc{font-size:.79rem;color:var(--c-muted)}
  .statrow{display:flex;gap:0;border:1px solid var(--c-line);border-radius:12px;overflow:hidden}
  .statrow .st{flex:1;text-align:center;padding:7px 2px;border-right:1px solid var(--c-line)}
  .statrow .st:last-child{border-right:none}
  .statrow .st b{display:block;font-family:'Sora';font-weight:700;font-size:.84rem}
  .statrow .st span{font-size:.56rem;letter-spacing:.06em;color:var(--c-muted);text-transform:uppercase}
  .meal .foot{margin-top:auto;display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:3px}
  .price{font-family:'Sora';font-weight:800;font-size:1.22rem;color:var(--lime)}
  .add{display:inline-flex;align-items:center;gap:6px;background:var(--lime);color:#0c1a07;font-weight:700;font-size:.82rem;padding:8px 13px;border-radius:11px;transition:.15s;cursor:pointer}
  .add:hover{background:var(--lime-2);transform:translateY(-1px)}

  /* ADMIN */
  .admin-meal{display:flex;gap:14px;align-items:center;padding:12px;background:var(--bg-2);border:1px solid var(--line);border-radius:14px;margin-bottom:12px}
  .admin-meal .t{width:60px;height:60px;border-radius:12px;background:linear-gradient(135deg,#1c1c20,#0e0e10);display:grid;place-items:center;font-size:2rem;flex:none}
  .admin-meal .nm{flex:1}
  .admin-meal .nm b{display:block;font-weight:700}
  .admin-meal .nm small{color:var(--muted);font-size:.8rem}
  .admin-meal .pe{width:80px;padding:8px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--text)}
  .admin-meal .del{padding:8px 12px;border-radius:8px;background:var(--card);border:1px solid var(--line);cursor:pointer;transition:.15s}
  .admin-meal .del:hover{border-color:var(--red)}

  .field{margin-bottom:16px}
  .field label{display:block;font-weight:600;font-size:.8rem;margin-bottom:6px;color:var(--muted)}
  .field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--bg-2);color:var(--text);font-size:.94rem;font-family:inherit}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--lime);box-shadow:0 0 0 3px rgba(143,204,63,.2)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}

  .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:99;grid:place-items center}
  .modal.on{display:grid}
  .modal-content{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:30px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}

  .toast{position:fixed;bottom:20px;right:20px;background:var(--lime);color:#0c1a07;padding:14px 20px;border-radius:12px;font-weight:600;z-index:101;animation:slideIn .3s ease}
  @keyframes slideIn{from{transform:translateY(100px);opacity:0}to{transform:none;opacity:1}}

  .section{padding:84px 0}
  .sec-head{text-align:center;max-width:660px;margin:0 auto 44px}
  .kick{display:inline-block;color:var(--lime);font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-size:.74rem;margin-bottom:10px}
  .sec-head h2{font-size:clamp(1.9rem,3.8vw,2.8rem);font-weight:800}
  .sec-head p{color:var(--muted);margin-top:10px}

  @media(max-width:1024px){
    .meals{grid-template-columns:repeat(3,1fr)}
    .hero-in{grid-template-columns:1fr}
  }
  @media(max-width:640px){
    .meals{grid-template-columns:repeat(2,1fr)}
    .admin-meal{flex-direction:column;align-items:flex-start}
  }
</style>

<div id="authPage" class="auth-page">
  <div class="auth-box">
    <h2>Admin Login</h2>
    <p>Sign in to manage your GoFit menu</p>
    <div class="field">
      <label>Email</label>
      <input id="authEmail" type="email" placeholder="admin@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="authPassword" type="password" placeholder="••••••••">
    </div>
    <button class="btn btn-lime" id="authBtn" style="width:100%">Sign in</button>
    <p style="text-align:center;color:var(--muted);font-size:.8rem;margin-top:16px">
      New admin? <button id="signupToggle" style="color:var(--lime);text-decoration:underline;background:none;border:none;cursor:pointer;padding:0">Create account</button>
    </p>
  </div>
</div>

<header class="nav" id="nav" style="display:none">
  <div class="wrap nav-in">
    <div class="brand" onclick="currentView='home';render()">
      <div class="mark">🍽️</div>
      <div class="wm"><span class="go">Go</span><span class="meal">Fit</span></div>
    </div>
    <div class="navlinks">
      <button id="navHome" class="active" onclick="currentView='home';render()">Home</button>
      <button id="navAdmin" onclick="currentView='admin';render()" style="display:none">Admin</button>
      <button id="navLogout" onclick="logout()" style="display:none">Logout</button>
    </div>
    <div class="nav-cart" onclick="currentView='checkout';render()">
      🛒
      <div class="badge" id="cartBadge" style="display:none">0</div>
    </div>
  </div>
</header>

<main id="app" style="display:none">
  <!-- HOME VIEW -->
  <div id="homeView" class="view">
    <section class="hero">
      <div class="wrap hero-in">
        <div>
          <h1>Fresh <span class="g">healthy</span> meals<br>delivered daily</h1>
          <p class="lead">Macro-tracked, chef-prepared meals straight to your door in Chattogram</p>
          <button class="btn btn-lime" onclick="currentView='menu';render()">Order now</button>
        </div>
      </div>
    </section>

    <section class="section zone-dark" style="padding:60px 0">
      <div class="wrap">
        <div class="sec-head">
          <div class="kick">Plans</div>
          <h2>Choose your meal plan</h2>
        </div>
        <div class="meals" id="plansGrid"></div>
      </div>
    </section>
  </div>

  <!-- MENU VIEW -->
  <div id="menuView" class="view">
    <section class="section zone-dark">
      <div class="wrap">
        <div class="sec-head">
          <h2>All meals</h2>
        </div>
        <div class="meals" id="mealsGrid"></div>
      </div>
    </section>
  </div>

  <!-- CHECKOUT VIEW -->
  <div id="checkoutView" class="view">
    <section class="section">
      <div class="wrap">
        <h2 style="margin-bottom:30px">Your cart</h2>
        <div id="cartItems" style="margin-bottom:30px"></div>
        <div style="max-width:500px">
          <div class="field">
            <label>Your name</label>
            <input id="checkoutName" type="text">
          </div>
          <div class="field">
            <label>Phone</label>
            <input id="checkoutPhone" type="tel" placeholder="+880...">
          </div>
          <div class="field">
            <label>Payment method</label>
            <select id="checkoutPayment">
              <option value="bkash">bKash</option>
              <option value="whatsapp">WhatsApp</option>
            </select>
          </div>
          <button class="btn btn-lime" onclick="submitOrder()" style="width:100%;margin-top:16px">Place order</button>
        </div>
      </div>
    </section>
  </div>

  <!-- ADMIN VIEW -->
  <div id="adminView" class="view">
    <section class="section">
      <div class="wrap">
        <h2 style="margin-bottom:30px">Admin panel</h2>
        
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-bottom:30px">
          <!-- MEALS -->
          <div>
            <h3 style="margin-bottom:14px">Meals</h3>
            <div id="adminMeals" style="margin-bottom:14px"></div>
            <button class="btn btn-lime" id="addMealBtn" style="width:100%">+ Add meal</button>
          </div>

          <!-- PLANS -->
          <div>
            <h3 style="margin-bottom:14px">Plans</h3>
            <div id="adminPlans" style="margin-bottom:14px"></div>
            <button class="btn btn-lime" id="addPlanBtn" style="width:100%">+ Add plan</button>
          </div>
        </div>

        <!-- SETTINGS -->
        <div style="background:var(--card);border:1px solid var(--line);border-radius:20px;padding:24px">
          <h3 style="margin-bottom:14px">Settings</h3>
          <div class="row2">
            <div class="field">
              <label>WhatsApp number</label>
              <input id="setWhatsapp" placeholder="+8801...">
            </div>
            <div class="field">
              <label>bKash number</label>
              <input id="setBkash" placeholder="+8801...">
            </div>
          </div>
          <button class="btn btn-lime" onclick="saveSettings()" style="margin-top:12px">Save settings</button>
        </div>
      </div>
    </section>
  </div>
</main>

<div id="mealModal" class="modal">
  <div class="modal-content" id="mealModalBox"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// SUPABASE INIT
const SUPABASE_URL = 'https://vkrndkgxvjgzooljkbvc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrcm5ka2d4dmpnem9vbGprYnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjEyNzQsImV4cCI6MjA5ODIzNzI3NH0.Mva44TRuXRbaxAf5aeZnoXcGj9rZ9xhzpx0yRhRcdSg';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let adminUser = false;
let currentView = 'home';
let MEALS = [];
let PLANS = [];
let SETTINGS = { whatsapp: '', bkash: '' };
let cart = {};

// HELPERS
const $ = id => document.getElementById(id);
const $$ = sel => document.querySelectorAll(sel);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const toast = msg => { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); };

// AUTH
async function handleAuth() {
  const email = $('authEmail').value.trim();
  const password = $('authPassword').value.trim();
  if (!email || !password) { toast('Please fill in all fields'); return; }
  
  $('authBtn').classList.add('loading');
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  $('authBtn').classList.remove('loading');
  
  if (error) {
    toast('Login failed: ' + error.message);
    return;
  }
  
  currentUser = data.user;
  adminUser = true;
  renderApp();
}

async function logout() {
  await supabase.auth.signOut();
  currentUser = null;
  adminUser = false;
  currentView = 'home';
  $('authPage').style.display = 'grid';
  $('app').style.display = 'none';
  $('nav').style.display = 'none';
  $('authEmail').value = '';
  $('authPassword').value = '';
}

// RENDER
function renderApp() {
  $('authPage').style.display = 'none';
  $('app').style.display = 'block';
  $('nav').style.display = 'block';
  
  if (adminUser) {
    $('navAdmin').style.display = 'block';
    $('navLogout').style.display = 'block';
  } else {
    $('navAdmin').style.display = 'none';
    $('navLogout').style.display = 'none';
  }
  
  $$('.view').forEach(v => v.classList.remove('on'));
  $('homeView').classList.add('on');
  
  render();
}

function render() {
  $$('.view').forEach(v => v.classList.remove('on'));
  switch(currentView) {
    case 'home': $('homeView').classList.add('on'); renderHome(); break;
    case 'menu': $('menuView').classList.add('on'); renderMenu(); break;
    case 'checkout': $('checkoutView').classList.add('on'); renderCheckout(); break;
    case 'admin': if(adminUser) { $('adminView').classList.add('on'); renderAdmin(); } break;
  }
  
  // Update nav
  $$('.navlinks button').forEach(b => b.classList.remove('active'));
  if (currentView === 'home') $('navHome').classList.add('active');
  
  // Update cart badge
  const cartCount = Object.keys(cart).length;
  if (cartCount > 0) {
    $('cartBadge').textContent = cartCount;
    $('cartBadge').style.display = 'grid';
  } else {
    $('cartBadge').style.display = 'none';
  }
}

function renderHome() {
  $('plansGrid').innerHTML = PLANS.map(p => `
    <div class="meal">
      <div class="pic" style="background:linear-gradient(135deg,#1c2c17,#0e1b13)">📦</div>
      <div class="body">
        <h4>${esc(p.name)}</h4>
        <p class="desc">${esc(p.blurb || '')}</p>
        <div class="statrow">
          <div class="st"><b>${esc(p.meals || '')}</b><span>Meals</span></div>
          <div class="st"><b>${p.price || 'TBA'}</b><span>Per week</span></div>
        </div>
      </div>
      <div class="foot" style="padding:15px 15px 0">
        <div class="price">${p.price ? 'BDT ' + p.price : 'Coming soon'}</div>
      </div>
    </div>
  `).join('');
}

function renderMenu() {
  $('mealsGrid').innerHTML = MEALS.map(m => `
    <div class="meal">
      <div class="pic" style="background-image:url('${m.img || ''}')">${m.img ? '' : (m.emoji || '🍽️')}</div>
      ${m.badge ? `<div class="tag">${esc(m.badge)}</div>` : ''}
      <div class="body">
        <h4>${esc(m.name)}</h4>
        <p class="desc">${esc(m.desc || '')}</p>
        <div class="statrow">
          <div class="st"><b>${m.kcal}</b><span>kcal</span></div>
          <div class="st"><b>${m.p}g</b><span>Protein</span></div>
          <div class="st"><b>${m.c}g</b><span>Carbs</span></div>
          <div class="st"><b>${m.f}g</b><span>Fat</span></div>
        </div>
      </div>
      <div class="foot" style="padding:15px 15px 0">
        <div class="price">BDT ${m.price}</div>
        <div class="add" onclick="cart['${m.id}']=(cart['${m.id}']||0)+1;render()">
          <div class="plus">+</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderCheckout() {
  if (Object.keys(cart).length === 0) {
    $('cartItems').innerHTML = '<p style="color:var(--muted)">Your cart is empty</p>';
    return;
  }
  
  let total = 0;
  const items = [];
  
  $('cartItems').innerHTML = MEALS
    .filter(m => cart[m.id])
    .map(m => {
      const qty = cart[m.id];
      const subtotal = m.price * qty;
      total += subtotal;
      items.push({ id: m.id, name: m.name, qty, price: m.price });
      return `
        <div style="display:flex;justify-content:space-between;padding:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:12px">
          <div>
            <b>${esc(m.name)}</b>
            <p style="color:var(--muted);font-size:.8rem">BDT ${m.price} × ${qty}</p>
          </div>
          <div style="text-align:right">
            <div style="font-weight:700">BDT ${subtotal}</div>
            <button class="btn btn-out" onclick="delete cart['${m.id}'];render()" style="padding:4px 8px;font-size:.8rem;margin-top:4px">Remove</button>
          </div>
        </div>
      `;
    }).join('');
  
  $('cartItems').innerHTML += `<div style="padding:14px;background:var(--card-2);border:1px solid var(--line);border-radius:12px;text-align:right"><b style="font-size:1.3rem">Total: BDT ${total}</b></div>`;
}

async function submitOrder() {
  const name = $('checkoutName').value.trim();
  const phone = $('checkoutPhone').value.trim();
  const payment = $('checkoutPayment').value;
  
  if (!name || !phone) { toast('Please fill in all fields'); return; }
  
  const items = MEALS.filter(m => cart[m.id]).map(m => ({ id: m.id, name: m.name, qty: cart[m.id], price: m.price }));
  const total = items.reduce((s, i) => s + (i.price * i.qty), 0);
  
  const { error } = await supabase.from('orders').insert({
    name, phone, total, pay: payment, items, date: new Date().toLocaleDateString()
  });
  
  if (error) { toast('Order failed: ' + error.message); return; }
  
  toast('Order placed! We\'ll contact you soon.');
  cart = {};
  currentView = 'home';
  render();
}

async function renderAdmin() {
  // Load meals
  const { data: meals } = await supabase.from('meals').select('*').order('order', { ascending: true });
  MEALS = meals || [];
  
  // Load plans
  const { data: plans } = await supabase.from('plans').select('*').order('order', { ascending: true });
  PLANS = plans || [];
  
  // Load settings
  const { data: settings } = await supabase.from('settings').select('*');
  settings?.forEach(s => { SETTINGS[s.key] = s.value; });
  $('setWhatsapp').value = SETTINGS.whatsapp || '';
  $('setBkash').value = SETTINGS.bkash || '';
  
  // Render meals
  $('adminMeals').innerHTML = MEALS.map(m => `
    <div class="admin-meal">
      <div class="t">${m.emoji || '🍽️'}</div>
      <div class="nm"><b>${esc(m.name)}</b><small>${esc(m.cat)} · ${m.kcal} kcal</small></div>
      <input class="pe" type="number" value="${m.price}" data-price="${m.id}">
      <button class="del" onclick="editMeal('${m.id}')" title="Edit">✎</button>
      <button class="del" onclick="deleteMeal('${m.id}')" title="Delete">🗑</button>
    </div>
  `).join('');
  
  $('adminPlans').innerHTML = PLANS.map(p => `
    <div style="background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px">
      <div class="row2">
        <div class="field" style="margin:0 0 8px"><label>Name</label><input data-pf="name" data-id="${p.id}" value="${esc(p.name || '')}"></div>
        <div class="field" style="margin:0 0 8px"><label>Price</label><input data-pf="price" data-id="${p.id}" value="${esc(p.price || '')}"></div>
      </div>
      <div style="display:flex;gap:8px"><button class="btn btn-lime" onclick="savePlan('${p.id}')" style="flex:1;padding:9px">Save</button><button class="btn btn-out" onclick="deletePlan('${p.id}')" style="padding:9px 14px">Delete</button></div>
    </div>
  `).join('');
  
  // Price change handler
  $('adminMeals').onchange = async e => {
    const input = e.target.closest('[data-price]');
    if (!input) return;
    const { error } = await supabase.from('meals').update({ price: +input.value || 0 }).eq('id', input.dataset.price);
    if (error) toast('Update failed: ' + error.message);
    else toast('Price updated');
  };
}

async function deleteMeal(id) {
  if (!confirm('Delete this meal?')) return;
  const { error } = await supabase.from('meals').delete().eq('id', id);
  if (error) toast('Delete failed: ' + error.message);
  else { toast('Meal deleted'); renderAdmin(); }
}

async function editMeal(id) {
  const m = MEALS.find(x => x.id === id);
  if (!m) return;
  
  $('mealModalBox').innerHTML = `
    <h3 style="margin-bottom:14px">Edit meal</h3>
    <div class="field"><label>Name</label><input id="emName" value="${esc(m.name || '')}"></div>
    <div class="row2">
      <div class="field"><label>Price</label><input id="emPrice" type="number" value="${m.price || 0}"></div>
      <div class="field"><label>Category</label><input id="emCat" value="${esc(m.cat || '')}"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Calories</label><input id="emKcal" type="number" value="${m.kcal || 0}"></div>
      <div class="field"><label>Badge</label><input id="emBadge" value="${esc(m.badge || '')}"></div>
    </div>
    <div class="row3">
      <div class="field"><label>Protein g</label><input id="emP" type="number" value="${m.p || 0}"></div>
      <div class="field"><label>Carbs g</label><input id="emC" type="number" value="${m.c || 0}"></div>
      <div class="field"><label>Fat g</label><input id="emF" type="number" value="${m.f || 0}"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Emoji</label><input id="emEmoji" value="${esc(m.emoji || '')}" maxlength="4"></div>
      <div class="field"><label>Image URL</label><input id="emImg" value="${esc(m.img || '')}"></div>
    </div>
    <div class="field"><label>Description</label><textarea id="emDesc" rows="2">${esc(m.desc || '')}</textarea></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-lime" onclick="saveMealEdit('${id}')" style="flex:1">Save</button>
      <button class="btn btn-out" onclick="$('mealModal').classList.remove('on')">Cancel</button>
    </div>
  `;
  $('mealModal').classList.add('on');
}

async function saveMealEdit(id) {
  const upd = {
    name: $('emName').value.trim(),
    price: +$('emPrice').value || 0,
    cat: $('emCat').value.trim(),
    kcal: +$('emKcal').value || 0,
    p: +$('emP').value || 0,
    c: +$('emC').value || 0,
    f: +$('emF').value || 0,
    emoji: $('emEmoji').value.trim() || '🍽️',
    img: $('emImg').value.trim(),
    badge: $('emBadge').value.trim(),
    desc: $('emDesc').value.trim()
  };
  
  const { error } = await supabase.from('meals').update(upd).eq('id', id);
  if (error) toast('Save failed: ' + error.message);
  else { toast('Meal saved'); $('mealModal').classList.remove('on'); renderAdmin(); }
}

async function savePlan(id) {
  const root = event.target.closest('[onclick*="' + id + '"]')?.parentElement?.parentElement;
  if (!root) return;
  
  const upd = {
    name: root.querySelector('[data-pf="name"]').value.trim(),
    price: root.querySelector('[data-pf="price"]').value.trim(),
    meals: root.querySelector('[data-pf="meals"]')?.value.trim() || '',
    ribbon: root.querySelector('[data-pf="ribbon"]')?.value.trim() || '',
    blurb: root.querySelector('[data-pf="blurb"]')?.value.trim() || ''
  };
  
  const { error } = await supabase.from('plans').update(upd).eq('id', id);
  if (error) toast('Save failed: ' + error.message);
  else { toast('Plan saved'); renderAdmin(); }
}

async function deletePlan(id) {
  if (!confirm('Delete this plan?')) return;
  const { error } = await supabase.from('plans').delete().eq('id', id);
  if (error) toast('Delete failed: ' + error.message);
  else { toast('Plan deleted'); renderAdmin(); }
}

async function saveSettings() {
  const whatsapp = $('setWhatsapp').value.trim();
  const bkash = $('setBkash').value.trim();
  
  await supabase.from('settings').upsert([
    { key: 'whatsapp', value: whatsapp },
    { key: 'bkash', value: bkash }
  ]);
  
  toast('Settings saved');
}

// INIT
async function init() {
  // Check if logged in
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    currentUser = session.user;
    adminUser = true;
    renderApp();
  } else {
    // Load public data
    const { data: meals } = await supabase.from('meals').select('*').order('order', { ascending: true });
    const { data: plans } = await supabase.from('plans').select('*').order('order', { ascending: true });
    MEALS = meals || [];
    PLANS = plans || [];
    renderApp();
  }
}

$('authBtn').onclick = handleAuth;
$('signupToggle').onclick = () => toast('Contact admin to create account');
$('authEmail').onkeypress = e => e.key === 'Enter' && handleAuth();
$('authPassword').onkeypress = e => e.key === 'Enter' && handleAuth();

init();
</script>
